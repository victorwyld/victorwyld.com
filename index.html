<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Victor Wyld</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: Georgia, serif;
    }

    body {
      position: relative;
    }

    .tilde-wrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      pointer-events: none;
      transform: translateY(-4vh);
      animation: tildeFadeOut 2.4s ease forwards;
      animation-delay: 3.4s;
    }

    .tilde-svg {
      width: 44vw;
      max-width: 620px;
      min-width: 260px;
      overflow: visible;
    }

    .tilde-path {
      fill: none;
      stroke: #222222;
      stroke-width: 30;
      stroke-linecap: round;
      stroke-linejoin: round;

      /* This creates the pen-draw effect */
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;

      animation: drawTilde 3.2s ease forwards;
    }

    .main {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
      color: #000000;
      font-size: 3rem;
      opacity: 0;
      animation: textFadeIn 1.2s ease forwards;
      animation-delay: 5.0s;
      transform: translateY(-2vh);
    }

    @keyframes drawTilde {
      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes tildeFadeOut {
      from {
        opacity: 1;
      }
      to {
        opacity: 0;
      }
    }

    @keyframes textFadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @media (max-width: 600px) {
      .tilde-wrap {
        transform: translateY(-5vh);
      }

      .tilde-svg {
        width: 62vw;
        min-width: 220px;
      }

      .tilde-path {
        stroke-width: 34;
      }

      .main {
        font-size: 3rem;
      }
    }
  </style>
</head>
<body>

  <div class="tilde-wrap" aria-hidden="true">
    <svg class="tilde-svg" viewBox="0 0 500 220">
      <path
        class="tilde-path"
        pathLength="1000"
        d="M45 130 C115 55, 190 55, 250 115 C310 175, 385 175, 455 90"
      />
    </svg>
  </div>

  <main class="main">Victor Wyld</main>

</body>
</html>
