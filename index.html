<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Victor Wyld</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
      overflow: hidden;
    }

    body {
      font-family: Georgia, "Times New Roman", serif;
      color: #000000;
    }

    /* =========================
       TILDE
    ========================== */
    .tilde {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;

      opacity: 0;
      transform: translateY(-6vh);

      animation:
        fadeIn 3.5s ease forwards,
        fadeOut 3.5s ease forwards;

      animation-delay:
        0s,
        6.5s; /* 3.5s fade in + 3s hold */
    }

    .tilde-svg {
      width: 58vw;
      max-width: 900px;
      min-width: 280px;
      height: auto;
    }

    .tilde-path {
      fill: none;

      /* HEAVY STROKE */
      stroke: #111111;
      stroke-width: 42;

      /* THIS IS THE IMPORTANT PART */
      stroke-linecap: square;   /* sharp ends */
      stroke-linejoin: miter;   /* sharp angles */
      stroke-miterlimit: 1;     /* forces hard points */

      stroke-dasharray: 1200;
      stroke-dashoffset: 1200;

      animation: draw 3.5s ease forwards;
    }

    /* =========================
       MAIN TEXT
    ========================== */
    .main {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;

      font-size: 3rem;
      line-height: 1;
      color: #000000;

      opacity: 0;
      transform: translateY(-2vh);

      animation: fadeIn 2.5s ease forwards;
      animation-delay: 9.0s;
    }

    /* =========================
       ANIMATIONS
    ========================== */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    @keyframes draw {
      from { stroke-dashoffset: 1200; }
      to { stroke-dashoffset: 0; }
    }

    /* =========================
       MOBILE
    ========================== */
    @media (max-width: 600px) {
      .tilde-svg {
        width: 78vw;
      }

      .main {
        font-size: 3rem;
      }
    }
  </style>
</head>

<body>

  <div class="tilde" aria-hidden="true">
    <svg class="tilde-svg" viewBox="0 0 600 240">
      <path class="tilde-path"
        d="
          M 40 150
          C 120 40, 200 40, 300 150
          C 400 260, 480 260, 560 90
        "
      />
    </svg>
  </div>

  <main class="main">
    Victor Wyld
  </main>

</body>
</html>
