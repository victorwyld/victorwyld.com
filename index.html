<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Victor Wyld</title>
  <meta name="description" content="Victor Wyld is an independent Canadian philosopher and author working on consciousness, participation, recognition, routing, provenance, and ethical responsibility.">

  <link rel="canonical" href="https://victorwyld.com/">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">

  <meta property="og:title" content="Victor Wyld">
  <meta property="og:description" content="Victor Wyld is an independent Canadian philosopher and author working on consciousness, participation, recognition, routing, provenance, and ethical responsibility.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://victorwyld.com/">
  <meta property="og:site_name" content="Victor Wyld">

  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Victor Wyld">
  <meta name="twitter:description" content="Victor Wyld is an independent Canadian philosopher and author working on consciousness, participation, recognition, routing, provenance, and ethical responsibility.">

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
      overflow: hidden;
    }

    body {
      font-family: Georgia, "Times New Roman", serif;
      color: #000000;
    }

    /* =========================
       TILDE
    ========================== */
    .tilde {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 48rem;
      font-weight: normal;
      line-height: 1;
      color: #111111;

      opacity: 0;
      transform: translateY(-9vh);

      animation:
        fadeIn 4.5s ease forwards,
        fadeOut 4.5s ease forwards;

      animation-delay:
        1s,
        7.5s;
    }

    /* =========================
       MAIN TEXT
    ========================== */
    .main {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 3rem;
      line-height: 1;
      color: #000000;

      opacity: 0;
      transform: translateY(-2vh);

      animation: fadeIn 3.5s ease forwards;
      animation-delay: 7.5s;
    }

    /* =========================
       NAVIGATION
    ========================== */
    .nav {
      position: fixed;
      bottom: 2rem;
      left: 0;
      width: 100%;
      text-align: center;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 0.82rem;
      z-index: 10;

      opacity: 0;
      animation: fadeIn 3.5s ease forwards;
      animation-delay: 10.5s;
    }

    .nav a {
      color: #000000;
      text-decoration: none;
      margin: 0 0.55rem;
      opacity: 0.45;
      transition: opacity 0.4s ease;
      white-space: nowrap;
    }

    .nav a:hover {
      opacity: 1;
    }

    /* =========================
       ANIMATIONS
    ========================== */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    /* =========================
       MOBILE
    ========================== */
    @media (max-width: 600px) {
      .tilde {
        font-size: 24rem;
        transform: translateY(-6vh);
      }

      .main {
        font-size: 3rem;
      }

      .nav {
        bottom: 1.25rem;
        font-size: 0.72rem;
        line-height: 1.8;
        padding: 0 1rem;
        box-sizing: border-box;
      }

      .nav a {
        margin: 0 0.35rem;
      }
    }
  </style>
</head>

<body>
  <div class="tilde" aria-hidden="true">~</div>

  <main class="main">
    Victor Wyld
  </main>

  <nav class="nav" aria-label="Main navigation">
    <a href="/about/">About</a>
    <a href="/work/">Work</a>
    <a href="/scrutinized-awareness/">Scrutinized Awareness</a>
    <a href="/recompression-problem/">Recompression</a>
    <a href="/participanthood-problem/">Participanthood</a>
  </nav>
</body>
</html>
