<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Victor Wyld</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: Georgia, serif;
    }

    body {
      position: relative;
    }

    .tilde-wrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      pointer-events: none;
      transform: translateY(-4vh);
      animation: tildeFadeOut 2.4s ease forwards;
      animation-delay: 4.05s;
    }

    .tilde-svg {
      width: 44vw;
      max-width: 620px;
      min-width: 260px;
      height: auto;
      overflow: visible;
    }

    .tilde-shape {
      fill: #111111;
      clip-path: url(#tildeReveal);
    }

    .reveal-rect {
      animation: revealTilde 3.84s ease forwards;
    }

    .main {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
      color: #000000;
      font-size: 4rem;
      opacity: 0;
      animation: textFadeIn 1.2s ease forwards;
      animation-delay: 6.45s;
      transform: translateY(-2vh);
    }

    @keyframes revealTilde {
      from {
        width: 0;
      }

      to {
        width: 500px;
      }
    }

    @keyframes tildeFadeOut {
      from {
        opacity: 1;
      }

      to {
        opacity: 0;
      }
    }

    @keyframes textFadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @media (max-width: 600px) {
      .tilde-wrap {
        transform: translateY(-5vh);
      }

      .tilde-svg {
        width: 62vw;
        min-width: 220px;
      }

      .main {
        font-size: 3rem;
      }
    }
  </style>
</head>

<body>

  <div class="tilde-wrap" aria-hidden="true">
    <svg class="tilde-svg" viewBox="0 0 500 220">
      <defs>
        <clipPath id="tildeReveal">
          <rect class="reveal-rect" x="0" y="0" width="0" height="220"></rect>
        </clipPath>
      </defs>

      <path
        class="tilde-shape"
        d="
          M 42 139
          C 70 93, 103 65, 139 62
          C 178 59, 211 82, 245 113
          C 279 144, 310 166, 348 160
          C 386 154, 420 119, 456 74

          L 466 80
          C 434 132, 396 174, 350 184
          C 302 194, 263 165, 226 131
          C 191 99, 165 82, 136 86
          C 107 90, 81 113, 55 153
          Z
        "
      />
    </svg>
  </div>

  <main class="main">Victor Wyld</main>

</body>
</html>
