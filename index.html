<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Victor Wyld</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: white;
      overflow: hidden;
    }

    .tilde {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Georgia, serif;
      font-size: 36rem;
      color: black;
      opacity: 0;
      animation:
        fadeIn 3s ease forwards,
        fadeOut 9s ease forwards;
      animation-delay:
        0s,
        5s;
    }

    .main {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Georgia, serif;
      font-size: 2rem;
      color: black;
      opacity: 0;
      animation: fadeIn 3s ease forwards;
      animation-delay: 14s;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="tilde">~</div>
  <div class="main">Victor Wyld</div>
</body>
</html>
