<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Victor Wyld</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: white;
      font-family: Georgia, serif;
    }

    .tilde-wrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: translateY(-4vh);
      animation: fadeOut 2.4s ease forwards;
      animation-delay: 4.05s;
    }

    .tilde-svg {
      width: 46vw;
      max-width: 620px;
      min-width: 260px;
    }

    .tilde-path {
      fill: none;
      stroke: #111;
      stroke-width: 28;

      /* IMPORTANT: sharp ends */
      stroke-linecap: butt;
      stroke-linejoin: miter;

      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;

      animation: draw 3.84s ease forwards;
    }

    .main {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      opacity: 0;
      animation: fadeIn 1.2s ease forwards;
      animation-delay: 6.45s;
      transform: translateY(-2vh);
    }

    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }

    @keyframes fadeOut {
      to { opacity: 0; }
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @media (max-width: 600px) {
      .main { font-size: 3rem; }
    }
  </style>
</head>

<body>

  <div class="tilde-wrap">
    <svg class="tilde-svg" viewBox="0 0 500 200">
      <path
        class="tilde-path"
        d="M40 130
           C 110 40, 170 40, 250 110
           C 330 180, 390 180, 460 90"
      />
    </svg>
  </div>

  <div class="main">Victor Wyld</div>

</body>
</html>
