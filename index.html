<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Victor Wyld</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
      overflow: hidden;
    }

    body {
      font-family: Georgia, "Times New Roman", serif;
      color: #000000;
    }

    /* =========================
       TILDE
    ========================== */
    .tilde {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 48rem;
      font-weight: normal;
      line-height: 1;
      color: #111111;

      opacity: 0;
      transform: translateY(-5.5vh);

      animation:
        fadeIn 4.5s ease forwards,
        fadeOut 4.5s ease forwards;

      animation-delay:
        1s,
        7.5s; /* 4.5s fade in + 3s hold */
    }

    /* =========================
       MAIN TEXT
       overlaps fade-out
    ========================== */
    .main {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 3rem;
      line-height: 1;
      color: #000000;

      opacity: 0;
      transform: translateY(-2vh);

      animation: fadeIn 3.5s ease forwards;

      /* starts BEFORE tilde fully disappears */
      animation-delay: 7.5s;
    }

    /* =========================
       ANIMATIONS
    ========================== */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    /* =========================
       MOBILE
    ========================== */
    @media (max-width: 600px) {
      .tilde {
        font-size: 24rem;
        transform: translateY(-6vh);
      }

      .main {
        font-size: 3rem;
      }
    }
  </style>
</head>

<body>
  <div class="tilde">~</div>

  <main class="main">
    Victor Wyld
  </main>
</body>
</html>
