<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Victor Wyld</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
      overflow: hidden;
    }

    body {
      font-family: Georgia, "Times New Roman", serif;
      color: #000000;
    }

    /* =========================
       TILDE
    ========================== */
    .tilde {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;

      opacity: 0;
      transform: translateY(-6vh);

      animation:
        fadeIn 3.5s ease forwards,
        fadeOut 3.5s ease forwards;

      animation-delay:
        0s,
        6.5s; /* 3.5s fade in + 3s hold */
    }

    .tilde-svg {
      width: clamp(360px, 58vw, 820px);
      height: auto;
      display: block;
    }

    .tilde-path {
      fill: #111111;
    }

    /* =========================
       MAIN TEXT
       overlaps fade-out
    ========================== */
    .main {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 3rem;
      line-height: 1;
      color: #000000;

      opacity: 0;
      transform: translateY(-2vh);

      animation: fadeIn 2.5s ease forwards;

      /* starts BEFORE tilde fully disappears */
      animation-delay: 9.0s;
    }

    /* =========================
       ANIMATIONS
    ========================== */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    /* =========================
       MOBILE
    ========================== */
    @media (max-width: 600px) {
      .tilde {
        transform: translateY(-6vh);
      }

      .tilde-svg {
        width: min(78vw, 430px);
      }

      .main {
        font-size: 3rem;
      }
    }
  </style>
</head>

<body>
  <div class="tilde" aria-hidden="true">
    <svg class="tilde-svg" viewBox="0 0 540 240" xmlns="http://www.w3.org/2000/svg">
      <path
        class="tilde-path"
        d="
          M 30 146
          C 78 83, 123 56, 173 58
          C 216 60, 251 89, 292 122
          C 330 152, 360 167, 394 164
          C 430 161, 461 133, 494 87

          L 508 95
          C 474 149, 441 183, 396 188
          C 349 193, 311 175, 269 142
          C 230 110, 200 89, 168 84
          C 129 78, 88 98, 44 160
          Z
        "
      />
    </svg>
  </div>

  <main class="main">
    Victor Wyld
  </main>
</body>
</html>
