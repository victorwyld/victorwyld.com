<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Victor Wyld</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: white;
      overflow: hidden;
    }

    body {
      font-family: Georgia, serif;
      color: black;
    }

    .tilde-wrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: translateY(-6vh);
      opacity: 1;
      animation: fadeOut 7.2s ease forwards;
      animation-delay: 5s;
    }

    .tilde-svg {
      width: 42vw;
      max-width: 620px;
      min-width: 260px;
      height: auto;
      overflow: visible;
    }

    .tilde-path {
      fill: none;
      stroke: black;
      stroke-width: 34;
      stroke-linecap: butt;
      stroke-linejoin: round;
      stroke-dasharray: 900;
      stroke-dashoffset: 900;
      animation: drawTilde 3s ease forwards;
    }

    .main {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Georgia, serif;
      font-size: 4rem;
      line-height: 1;
      color: black;
      opacity: 0;
      animation: fadeIn 3s ease forwards;
      animation-delay: 12.2s;
    }

    @keyframes drawTilde {
      from {
        stroke-dashoffset: 900;
      }

      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes fadeOut {
      from {
        opacity: 1;
      }

      to {
        opacity: 0;
      }
    }

    @media (max-width: 600px) {
      .tilde-svg {
        width: 60vw;
        min-width: 220px;
      }

      .tilde-path {
        stroke-width: 38;
      }

      .main {
        font-size: 3rem;
      }
    }
  </style>
</head>

<body>
  <div class="tilde-wrap" aria-hidden="true">
    <svg class="tilde-svg" viewBox="0 0 500 220">
      <path
        class="tilde-path"
        d="M45 130 C115 55, 190 55, 250 115 C310 175, 385 175, 455 90"
      />
    </svg>
  </div>

  <main class="main">
    Victor Wyld
  </main>
</body>
</html>
